<!doctype html>
<html>
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="css/style.css" />
		<title>Nikola Stijepic Portfolio - Contact</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body #top>
		<header>
			<nav class="nav-bar flex justify-center align-center">
				<ul
					class="nav-links flex justify-center align-center"
				>
					<li><a href="index.html">Home</a></li>
					<li><a href="about.html">About Me</a></li>
					<li><a class="active" href="contact.html">Contact</a></li>
				</ul>
				<div class="nav-icons">
					<a href="https://github.com/nikolastijepic" target="_blank"
						><img
							src="assets/icons/square-github-brands-solid.png"
							alt="GitHub"
					/></a>
					<a href="https://wa.me/387644224485" target="_blank">
						<img
							src="assets/icons/square-whatsapp-brands-solid.png"
							alt="WhatsApp"
					/></a>
				</div>
			</nav>
			</nav>
		</header>
		<main>
			<section class="contact-section flex flex-column">
				<h2>Contact Me</h2>

				<form class="contact-form flex flex-column">
					<div class="form-group flex flex-column">
						<label for="name">Name</label>
						<input
							type="text"
							id="name"
							name="name"
							placeholder="Your name"
							required
						/>
					</div>

					<div class="form-group flex flex-column">
						<label for="email">Email</label>
						<input
							type="email"
							id="email"
							name="email"
							placeholder="your@email.com"
							required
						/>
					</div>

					<div class="form-group flex flex-column">
						<label for="subject">Subject</label>
						<input
							type="text"
							id="subject"
							name="subject"
							placeholder="Subject"
						/>
					</div>

					<div class="form-group flex flex-column">
						<label for="message">Message</label>
						<textarea
							id="message"
							name="message"
							rows="5"
							placeholder="Write your message..."
							required
						></textarea>
					</div>

					<button type="submit">Send Message</button>
				</form>
			</section>
		</main>
		<footer class="footer flex justify-center align-center">
			<p>&COPY; 2026 Nikola Stijepic</p>
		</footer>
		<a href="#top" class="back-to-top" aria-label="Back to top">↑</a>
	</body>
</html>
